<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff !important;
            color: #000000 !important;
            padding: 20px;
        }
        .form-container {
            display: block;
            white-space: nowrap;
            margin-bottom: 30px;
        }
        input {
            display: inline-block !important;
            width: 180px;
            padding: 10px;
            margin-right: 10px;
            background-color: #d0d0d0 !important;
            color: #000000 !important;
            border: 2px solid #555555 !important;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
        .movie-item {
            margin-top: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border: 1px solid #ccc;
            color: #000000;
        }
        .btn-delete {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Add Movies</h1>
    <div class="form-container">
        <input type="text" id="name" placeholder="Enter Movie Name" />
        <input type="text" id="category" placeholder="Enter Movie Category" />
        <input type="text" id="img" placeholder="Enter Image URL" />
        <input type="text" id="desc" placeholder="Enter Description" />
        <button onclick="handelSubmit()">Submit</button>
    </div>
    <h2>Stored Movies</h2>
    <div id="movieContainer"></div>
    <script>
        const displayMovies = () => {
            const movies = JSON.parse(localStorage.getItem("movies")) || [];
            const container = document.getElementById("movieContainer");
            container.innerHTML = "";
            movies.forEach((movie, index) => {
                const itemHTML = `
                    <div class="movie-item">
                        <img src="${movie.img}" alt="Poster" style="width:150px;"><br><br>
                        <strong>Name:</strong> ${movie.name}<br>
                        <strong>Category:</strong> ${movie.category}<br>
                        <p><strong>Description:</strong> ${movie.desc}</p>
                        <button class="btn-delete" onclick="deleteMovie(${index})">Delete</button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });
        };
        const deleteMovie = (index) => {
            const movies = JSON.parse(localStorage.getItem("movies")) || [];
            movies.splice(index, 1);
            localStorage.setItem("movies", JSON.stringify(movies));
            displayMovies();
        };
        const handelSubmit = () => {
            const name = document.getElementById("name").value;
            const category = document.getElementById("category").value;
            const img = document.getElementById("img").value;
            const desc = document.getElementById("desc").value;
            if (!name || !category) { alert("Please fill fields!"); return; }
            const movie = { name, category, img, desc };
            const movies = JSON.parse(localStorage.getItem("movies")) || [];
            movies.push(movie);
            localStorage.setItem("movies", JSON.stringify(movies));
            displayMovies();
            document.getElementById("name").value = "";
            document.getElementById("category").value = "";
            document.getElementById("img").value = "";
            document.getElementById("desc").value = "";
        };
        window.onload = displayMovies;
    </script>
</body>
</html>
